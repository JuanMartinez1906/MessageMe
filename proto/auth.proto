syntax = "proto3";

package messageme.auth;

option go_package = "github.com/messageme/proto/auth";

import "google/protobuf/timestamp.proto";

service AuthService {
  // Register a new user. Called by api-gateway on POST /api/auth/register.
  rpc Register(RegisterRequest) returns (AuthResponse);

  // Authenticate with email + password. Called on POST /api/auth/login.
  rpc Login(LoginRequest) returns (AuthResponse);

  // Exchange a refresh token for a new access token.
  rpc Refresh(RefreshRequest) returns (AuthResponse);

  // Invalidate refresh token. Called on POST /api/auth/logout.
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // Validate an access JWT. Called by api-gateway on every authenticated request.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message RegisterRequest {
  string email = 1;
  string username = 2;
  string password = 3;
  string display_name = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message AuthResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp access_expires_at = 4;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  google.protobuf.Timestamp expires_at = 3;
}
