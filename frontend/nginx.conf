# nginx config for the frontend container in K8s.
# The Traefik ingress handles /api/* and /socket.io/* — nginx here only
# serves the static SPA files.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
