# nginx config for the MessageMe app EC2.
# Installed to /etc/nginx/sites-available/messageme and symlinked into
# sites-enabled. Serves the React SPA under / and reverse-proxies /api/ to
# api-gateway and /socket.io/ to ws-gateway (both running in docker-compose
# on the same host).

server {
    listen 80 default_server;
    server_name _;

    # Health check for the ALB target group.
    location = /health.html {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # REST API → api-gateway container.
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (socket.io) → ws-gateway container.
    # Upgrade/Connection headers are what turn this into a real WS tunnel.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8081/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # React SPA — fall back to index.html so client-side routing works.
    root /var/www/messageme;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
