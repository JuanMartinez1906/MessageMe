# media-processor — Kafka consumer only, no inbound traffic so no Service.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-processor
  namespace: messageme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-processor
  template:
    metadata:
      labels:
        app: media-processor
    spec:
      containers:
        - name: media-processor
          image: 978714898304.dkr.ecr.us-east-1.amazonaws.com/messageme/media-processor:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              valueFrom: { configMapKeyRef: { name: messageme-config, key: NODE_ENV } }
            - name: S3_REGION
              valueFrom: { configMapKeyRef: { name: messageme-config, key: S3_REGION } }
            - name: S3_BUCKET
              valueFrom: { configMapKeyRef: { name: messageme-config, key: S3_BUCKET } }
            - name: S3_ENDPOINT
              valueFrom: { configMapKeyRef: { name: messageme-config, key: S3_ENDPOINT } }
            - name: S3_FORCE_PATH_STYLE
              valueFrom: { configMapKeyRef: { name: messageme-config, key: S3_FORCE_PATH_STYLE } }
            - name: S3_ACCESS_KEY_ID
              valueFrom: { configMapKeyRef: { name: messageme-config, key: S3_ACCESS_KEY_ID } }
            - name: S3_SECRET_ACCESS_KEY
              valueFrom: { configMapKeyRef: { name: messageme-config, key: S3_SECRET_ACCESS_KEY } }
            - name: KAFKA_BROKERS
              valueFrom: { configMapKeyRef: { name: messageme-config, key: KAFKA_BROKERS } }
            - name: KAFKA_CLIENT_ID
              value: "media-processor"
            - name: KAFKA_GROUP_ID
              value: "media-processor-files-uploaded"
            - name: EVENTS_DIR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: EVENTS_DIR } }
