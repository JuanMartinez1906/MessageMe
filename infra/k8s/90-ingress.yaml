# Ingress — routes external HTTP traffic into the cluster. Works with any
# IngressController that honours `ingressClassName: nginx`. On Docker Desktop
# kubeadm: instalá ingress-nginx con
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/cloud/deploy.yaml
# y queda accesible en http://localhost/ (el controller expone un Service
# LoadBalancer que Docker Desktop mapea al host).
#
# Rules (longest path first — nginx-ingress picks the most specific match):
#   /api/*       → api-gateway:8080
#   /socket.io/* → ws-gateway:8081
#   /            → frontend:80

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messageme
  namespace: messageme
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: ws-gateway
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
