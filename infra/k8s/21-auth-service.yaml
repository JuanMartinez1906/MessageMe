apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-migrate
  namespace: messageme
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: 978714898304.dkr.ecr.us-east-1.amazonaws.com/messageme/auth-service:dev
          imagePullPolicy: IfNotPresent
          workingDir: /app/services/auth-service
          command: ["npx", "prisma", "db", "push", "--skip-generate", "--accept-data-loss"]
          env:
            - name: DATABASE_URL
              value: "postgresql://messageme:messageme@postgres:5432/messageme_auth?schema=public"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: messageme
spec:
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: messageme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 978714898304.dkr.ecr.us-east-1.amazonaws.com/messageme/auth-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
          env:
            - name: NODE_ENV
              valueFrom: { configMapKeyRef: { name: messageme-config, key: NODE_ENV } }
            - name: GRPC_HOST
              valueFrom: { configMapKeyRef: { name: messageme-config, key: GRPC_HOST } }
            - name: GRPC_PORT
              value: "50051"
            - name: DATABASE_URL
              value: "postgresql://messageme:messageme@postgres:5432/messageme_auth?schema=public"
            - name: USER_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: USER_SERVICE_ADDR } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: messageme-secrets, key: JWT_SECRET } }
            - name: JWT_REFRESH_SECRET
              valueFrom: { secretKeyRef: { name: messageme-secrets, key: JWT_REFRESH_SECRET } }
            - name: JWT_ACCESS_TTL_SECONDS
              valueFrom: { configMapKeyRef: { name: messageme-config, key: JWT_ACCESS_TTL_SECONDS } }
            - name: JWT_REFRESH_TTL_SECONDS
              valueFrom: { configMapKeyRef: { name: messageme-config, key: JWT_REFRESH_TTL_SECONDS } }
            - name: BCRYPT_ROUNDS
              valueFrom: { configMapKeyRef: { name: messageme-config, key: BCRYPT_ROUNDS } }
