apiVersion: batch/v1
kind: Job
metadata:
  name: channel-service-migrate
  namespace: messageme
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: messageme/channel-service:dev
          imagePullPolicy: IfNotPresent
          workingDir: /app/services/channel-service
          command: ["npx", "prisma", "db", "push", "--skip-generate", "--accept-data-loss"]
          env:
            - name: DATABASE_URL
              value: "postgresql://messageme:messageme@postgres:5432/messageme_channel?schema=public"
---
apiVersion: v1
kind: Service
metadata:
  name: channel-service
  namespace: messageme
spec:
  selector:
    app: channel-service
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: channel-service
  namespace: messageme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: channel-service
  template:
    metadata:
      labels:
        app: channel-service
    spec:
      containers:
        - name: channel-service
          image: messageme/channel-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50054
          env:
            - name: NODE_ENV
              valueFrom: { configMapKeyRef: { name: messageme-config, key: NODE_ENV } }
            - name: GRPC_HOST
              valueFrom: { configMapKeyRef: { name: messageme-config, key: GRPC_HOST } }
            - name: GRPC_PORT
              value: "50054"
            - name: DATABASE_URL
              value: "postgresql://messageme:messageme@postgres:5432/messageme_channel?schema=public"
            - name: GROUP_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: GROUP_SERVICE_ADDR } }
