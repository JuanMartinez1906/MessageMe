apiVersion: batch/v1
kind: Job
metadata:
  name: user-service-migrate
  namespace: messageme
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: 978714898304.dkr.ecr.us-east-1.amazonaws.com/messageme/user-service:dev
          imagePullPolicy: IfNotPresent
          workingDir: /app/services/user-service
          command: ["npx", "prisma", "db", "push", "--skip-generate", "--accept-data-loss"]
          env:
            - name: DATABASE_URL
              value: "postgresql://messageme:messageme@postgres:5432/messageme_user?schema=public"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: messageme
spec:
  selector:
    app: user-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: messageme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 978714898304.dkr.ecr.us-east-1.amazonaws.com/messageme/user-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50052
          env:
            - name: NODE_ENV
              valueFrom: { configMapKeyRef: { name: messageme-config, key: NODE_ENV } }
            - name: GRPC_HOST
              valueFrom: { configMapKeyRef: { name: messageme-config, key: GRPC_HOST } }
            - name: GRPC_PORT
              value: "50052"
            - name: DATABASE_URL
              value: "postgresql://messageme:messageme@postgres:5432/messageme_user?schema=public"
