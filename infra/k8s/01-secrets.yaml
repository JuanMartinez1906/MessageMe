# Secrets for MessageMe — JWT signing + DB credentials.
# These are dev defaults so the cluster can boot without manual edits. For prod,
# replace with values from `openssl rand -hex 32` and re-apply.

apiVersion: v1
kind: Secret
metadata:
  name: messageme-secrets
  namespace: messageme
type: Opaque
stringData:
  JWT_SECRET: "dev-access-secret-change-me"
  JWT_REFRESH_SECRET: "dev-refresh-secret-change-me"
  POSTGRES_USER: "messageme"
  POSTGRES_PASSWORD: "messageme"
