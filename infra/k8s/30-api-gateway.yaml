apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: messageme
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: messageme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: 978714898304.dkr.ecr.us-east-1.amazonaws.com/messageme/api-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              valueFrom: { configMapKeyRef: { name: messageme-config, key: NODE_ENV } }
            - name: PORT
              value: "8080"
            - name: CORS_ORIGIN
              valueFrom: { configMapKeyRef: { name: messageme-config, key: CORS_ORIGIN } }
            - name: AUTH_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: AUTH_SERVICE_ADDR } }
            - name: USER_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: USER_SERVICE_ADDR } }
            - name: GROUP_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: GROUP_SERVICE_ADDR } }
            - name: CHANNEL_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: CHANNEL_SERVICE_ADDR } }
            - name: DIRECT_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: DIRECT_SERVICE_ADDR } }
            - name: MESSAGE_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: MESSAGE_SERVICE_ADDR } }
            - name: PRESENCE_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: PRESENCE_SERVICE_ADDR } }
            - name: DELIVERY_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: DELIVERY_SERVICE_ADDR } }
            - name: FILE_SERVICE_ADDR
              valueFrom: { configMapKeyRef: { name: messageme-config, key: FILE_SERVICE_ADDR } }
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
